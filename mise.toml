[tools]
rust = "1.96.0"

[env]
_.file = ".env"

[tasks.fmt]
run = "cargo fmt"

[tasks.lint]
run = "cargo clippy --all"

[tasks.commit]
depends = ["fmt", "lint"]
usage = '''
arg "<message>" help="Commit message"
flag "-p --push" help="Push after commit"
'''
run = '''
git add .
git commit -m "${usage_message}"

if [ ${useg_p} ]; then
  git push
fi
'''
